<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F88 Pickleball - Đăng Ký Đánh Đôi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #764ba2;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 24px 0 12px;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #764ba2;
      box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.15);
    }

    .team-box {
      background: #f8f6ff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .team-box .team-label {
      font-size: 13px;
      font-weight: 600;
      color: #764ba2;
      margin-bottom: 10px;
    }

    .bet-section {
      background: #fff8f0;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .bet-section .bet-label {
      font-size: 13px;
      font-weight: 600;
      color: #e67e22;
      margin-bottom: 10px;
    }

    .bet-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bet-option {
      padding: 8px 4px;
      text-align: center;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      background: white;
    }

    .bet-option:hover {
      border-color: #e67e22;
    }

    .bet-option.selected {
      background: #e67e22;
      color: white;
      border-color: #e67e22;
    }

    .bet-amount-display {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 10px;
    }

    .note-area textarea {
      resize: vertical;
      min-height: 60px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(118, 75, 162, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit.loading {
      position: relative;
      color: transparent;
    }

    .btn-submit.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .success-message.show {
      display: block;
    }

    .success-message .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .success-message h2 {
      font-size: 22px;
      color: #2ecc71;
      margin-bottom: 8px;
    }

    .success-message p {
      color: #666;
      margin-bottom: 20px;
    }

    .btn-reset {
      padding: 10px 24px;
      background: #eee;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      color: #444;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      .form-row { grid-template-columns: 1fr; }
      .bet-options { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <div class="logo">🏓</div>
    <h1>F88 Pickleball Club</h1>
    <p>Đăng ký lịch đánh đôi</p>
  </div>

  <form id="pickleForm">
    <div class="section-title">Đội 1</div>
    <div class="team-box">
      <div class="form-group">
        <label>Họ và tên thành viên 1</label>
        <input type="text" id="t1p1" placeholder="VD: Nguyễn Văn A" required>
      </div>
      <div class="form-group">
        <label>Họ và tên thành viên 2</label>
        <input type="text" id="t1p2" placeholder="VD: Trần Văn B" required>
      </div>
    </div>

    <div class="section-title">Đội 2</div>
    <div class="team-box">
      <div class="form-group">
        <label>Họ và tên thành viên 1</label>
        <input type="text" id="t2p1" placeholder="VD: Lê Văn C" required>
      </div>
      <div class="form-group">
        <label>Họ và tên thành viên 2</label>
        <input type="text" id="t2p2" placeholder="VD: Phạm Văn D" required>
      </div>
    </div>

    <div class="section-title">Mức cược</div>
    <div class="bet-section">
      <div class="bet-label">💰 Chọn bội số của 10.000₫</div>
      <div class="bet-options" id="betOptions">
        <div class="bet-option" data-bet="1">1x<br><small>10k</small></div>
        <div class="bet-option" data-bet="2">2x<br><small>20k</small></div>
        <div class="bet-option" data-bet="3">3x<br><small>30k</small></div>
        <div class="bet-option" data-bet="4">4x<br><small>40k</small></div>
        <div class="bet-option" data-bet="5">5x<br><small>50k</small></div>
        <div class="bet-option" data-bet="10">10x<br><small>100k</small></div>
        <div class="bet-option" data-bet="20">20x<br><small>200k</small></div>
        <div class="bet-option" data-bet="25">25x<br><small>250k</small></div>
      </div>
      <div class="bet-amount-display" id="betDisplay">0₫</div>
    </div>

    <div class="section-title">Ghi chú</div>
    <div class="note-area">
      <textarea id="note" placeholder="Ghi chú thêm (không bắt buộc)"></textarea>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button type="submit" class="btn-submit" id="submitBtn">🏓 Đăng ký đánh đôi</button>
  </form>

  <div class="success-message" id="successMsg">
    <div class="icon">✅</div>
    <h2>Đăng ký thành công!</h2>
    <p>Thông tin của bạn đã được ghi nhận. Đối thủ sẽ liên hệ với bạn sớm nhất!</p>
    <button class="btn-reset" onclick="location.reload()">🏓 Đăng ký thêm</button>
  </div>
</div>

<script>
// === CONFIG: THAY URL NÀY SAU KHI DEPLOY APPS SCRIPT ===
// Lưu cả 2 URL, dùng URL cũ làm fallback (bản v2 đã chạy ổn)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvfQHjup4BOlYIF6W9RJdJ_m4-c3nKATbYZoYjnRSRny7A8lw60OV3sHK9CdfXxUuW/exec';
const NOTIFY_URL = 'https://script.google.com/macros/s/AKfycbwghdu0iRekgAjj2OkWZTwdlpMdd3wWVmfCRNaEU5IayxivcSIUHxW3yKNVVn_C5GZ4JQ/exec';

let selectedBet = null;

// Bet option click
document.querySelectorAll('.bet-option').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.bet-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedBet = parseInt(el.dataset.bet);
    document.getElementById('betDisplay').textContent = 
      new Intl.NumberFormat('vi-VN').format(selectedBet * 10000) + '₫';
  });
});

// Form submit
document.getElementById('pickleForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('errorMsg');
  errorEl.classList.remove('show');
  errorEl.textContent = '';

  // Validate
  const fields = {
    t1p1: document.getElementById('t1p1').value.trim(),
    t1p2: document.getElementById('t1p2').value.trim(),
    t2p1: document.getElementById('t2p1').value.trim(),
    t2p2: document.getElementById('t2p2').value.trim(),
  };

  if (!fields.t1p1 || !fields.t1p2 || !fields.t2p1 || !fields.t2p2) {
    errorEl.textContent = 'Vui lòng điền đầy đủ họ tên cả 4 thành viên!';
    errorEl.classList.add('show');
    return;
  }

  if (!selectedBet) {
    errorEl.textContent = 'Vui lòng chọn mức cược!';
    errorEl.classList.add('show');
    return;
  }

  // Check duplicate names
  const names = Object.values(fields);
  if (new Set(names).size !== names.length) {
    errorEl.textContent = 'Thành viên bị trùng tên! Mỗi người chỉ xuất hiện 1 lần.';
    errorEl.classList.add('show');
    return;
  }

  // Send
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Đang gửi...';

  try {
    // Gửi dữ liệu dạng URL-encoded tới Apps Script Web App
    const params = new URLSearchParams();
    params.append('team1Player1', fields.t1p1);
    params.append('team1Player2', fields.t1p2);
    params.append('team2Player1', fields.t2p1);
    params.append('team2Player2', fields.t2p2);
    params.append('betMultiplier', selectedBet + 'x (' + (selectedBet * 10000).toLocaleString('vi-VN') + '₫)');
    params.append('betAmount', (selectedBet * 10000).toLocaleString('vi-VN'));
    params.append('note', document.getElementById('note').value.trim() || '');

    // Dùng fetch với mode no-cors và content-type x-www-form-urlencoded
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });

    // Luôn hiện thành công (no-cors không đọc được response)
    document.getElementById('pickleForm').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');

  } catch (err) {
    // Nếu fetch fail, thử phương án dự phòng: submit qua iframe
    try {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.name = 'pickleSubmit';
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = APPS_SCRIPT_URL;
      form.target = 'pickleSubmit';

      const fieldsData = {
        team1Player1: fields.t1p1,
        team1Player2: fields.t1p2,
        team2Player1: fields.t2p1,
        team2Player2: fields.t2p2,
        betMultiplier: selectedBet + 'x (' + (selectedBet * 10000).toLocaleString('vi-VN') + '₫)',
        betAmount: (selectedBet * 10000).toLocaleString('vi-VN'),
        note: document.getElementById('note').value.trim() || ''
      };

      for (const [key, val] of Object.entries(fieldsData)) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = val;
        form.appendChild(input);
      }

      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        document.body.removeChild(form);
        document.body.removeChild(iframe);
      }, 1000);
    } catch(e) {}

    document.getElementById('pickleForm').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');
  }
});
</script>

</body>
</html>
